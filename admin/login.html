
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Nurael Abaya</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-mark">N</div>
    <h1>Nurael Admin</h1>
    <p class="sub">Sign in to manage products, stock and your storefront.</p>
    <div id="error-box"></div>
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <p class="hint">Sign in with the admin email/password you created in Supabase<br>(Authentication → Users).</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('error-box');
    errBox.innerHTML = '';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error){
      errBox.innerHTML = `<div class="error-msg">${error.message}</div>`;
      return;
    }
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
